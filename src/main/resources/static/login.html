<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindDot</title>
    <style>
        :root {
            --blue-900: #0f2747;
            --blue-700: #1f4f82;
            --blue-500: #3f7fbe;
            --blue-300: #dbeafb;
            --blue-100: #f4f9ff;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: Arial, sans-serif;
            background: linear-gradient(160deg, #eaf4ff 0%, #bfd8f5 100%);
            color: var(--blue-900);
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            padding: 32px 28px;
            border-radius: 18px;
            background: var(--white);
            box-shadow: 0 18px 40px rgba(24, 64, 108, 0.18);
        }

        h2 {
            margin: 0 0 8px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            margin: 0 0 24px;
            text-align: center;
            color: var(--blue-700);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #c5d9ef;
            border-radius: 10px;
            background: var(--blue-100);
            color: var(--blue-900);
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: var(--blue-500);
            box-shadow: 0 0 0 3px rgba(63, 127, 190, 0.18);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .primary {
            background: var(--blue-700);
            color: var(--white);
        }

        .secondary {
            background: #d8e8f8;
            color: var(--blue-900);
        }

        button:hover {
            transform: translateY(-1px);
        }

        .primary:hover {
            background: #183f69;
        }

        .secondary:hover {
            background: #c8ddf3;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Login or create an account to continue.</p>

    <div class="form-group">
        <input id="email" placeholder="Email">
    </div>

    <div class="form-group">
        <input id="password" placeholder="Password" type="password">
    </div>

    <div class="actions">
        <button class="secondary" onclick="register()">Register</button>
        <button class="primary" onclick="login()">Login</button>
    </div>
</div>
<script>
    function getCredentials() {
        return {
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value
        };
    }

    function register() {
        const credentials = getCredentials();

        fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(credentials)
        })
            .then(async res => {
                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    throw new Error(data.message || "Registration failed");
                }
                alert("Registered successfully. You can now log in.");
            })
            .catch(err => {
                alert(err.message);
            });
    }

    function login() {
        const credentials = getCredentials();

        fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(credentials)
        })
            .then(async res => {
                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    throw new Error(data.message || "Login failed");
                }
                alert("Login successful");
                window.location.href = "/dashboard";
            })
            .catch(err => {
                alert(err.message);
            });
    }
</script>

</body>
</html>
